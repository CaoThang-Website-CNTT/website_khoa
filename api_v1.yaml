openapi: 3.1.0
info:
  title: Hệ Thống Quản Lý Khoa/Trường Học API (Prototype)
  version: 1.0.0
  description: >
    Tài liệu API phục vụ cho Page Visitor, Dashboard, và AJAX Calls.
    Giai đoạn Prototype: Chưa tích hợp Authentication.
servers:
  - url: https://localhost:3000/website_khoa/api/v1
    description: Local Server

paths:
  # ==========================================
  # STUDENTS API
  # ==========================================
  /students:
    get:
      summary: Lấy danh sách Sinh viên (Có phân trang)
      tags:
        - Students
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedStudents"
    post:
      summary: Tạo mới Sinh viên
      tags:
        - Students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "201":
          description: Tạo thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "422":
          $ref: "#/components/responses/ValidationError"

  /students/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      summary: Lấy chi tiết Sinh viên
      tags:
        - Students
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      summary: Cập nhật thông tin Sinh viên
      tags:
        - Students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "200":
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      summary: Xóa Sinh viên (Soft Delete)
      tags:
        - Students
      responses:
        "204":
          description: Xóa thành công (Không trả về content)
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ==========================================
  # TEACHERS API
  # ==========================================
  /teachers:
    get:
      summary: Lấy danh sách Giáo viên (Có phân trang)
      tags:
        - Teachers
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTeachers"
    post:
      summary: Tạo mới Giáo viên
      tags:
        - Teachers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeacherInput"
      responses:
        "201":
          description: Tạo thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"
        "422":
          $ref: "#/components/responses/ValidationError"

  /teachers/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      summary: Lấy chi tiết Giáo viên
      tags:
        - Teachers
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"
        "404":
          $ref: "#/components/responses/NotFoundError"
          # ==========================================
  # CLASSROOMS API
  # ==========================================
  /classrooms:
    get:
      summary: Lấy danh sách Lớp học
      tags: [Classrooms]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedClassrooms"
    post:
      summary: Tạo Lớp học mới
      tags: [Classrooms]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassroomInput"
      responses:
        "201":
          description: Tạo thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classroom"

  /classrooms/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      summary: Lấy chi tiết Lớp học
      tags: [Classrooms]
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classroom"

  # ==========================================
  # CATEGORIES API
  # ==========================================
  /categories:
    get:
      summary: Lấy danh sách Danh mục
      tags: [Categories]
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      summary: Tạo Danh mục
      tags: [Categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Thành công

  # ==========================================
  # MENUS API
  # ==========================================
  /menus:
    get:
      summary: Lấy danh sách Menu
      tags: [Menus]
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Menu"

  # ==========================================
  # CAROUSELS API
  # ==========================================
  /carousels:
    get:
      summary: Lấy danh sách Carousels
      tags: [Carousels]
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Carousel"

  # ==========================================
  # PLACEHOLDERS CHO CÁC MODULE KHÁC
  # ==========================================
  # /menus: ...
  # /carousels: ...
  # /categories: ...
  # /classrooms: ...

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: ID của resource
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
      description: Trang hiện tại
    LimitParam:
      name: per_page
      in: query
      schema:
        type: integer
        default: 15
      description: Số lượng records trên mỗi trang

  responses:
    NotFoundError:
      description: Không tìm thấy resource
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Không tìm thấy dữ liệu yêu cầu."
    ValidationError:
      description: Lỗi Validate Dữ Liệu (Chuẩn Laravel Form Request)
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Dữ liệu không hợp lệ."
              errors:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
                example:
                  email: ["Email này đã được sử dụng."]
                  national_id: ["CCCD phải đủ 12 số."]

  schemas:
    # -------------------------
    # PAGINATION WRAPPER
    # -------------------------
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        last_page:
          type: integer

    PaginatedStudents:
      allOf:
        - $ref: "#/components/schemas/PaginationMeta"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Student"

    PaginatedTeachers:
      allOf:
        - $ref: "#/components/schemas/PaginationMeta"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Teacher"

    # -------------------------
    # MODELS: STUDENTS
    # -------------------------
    Student:
      type: object
      properties:
        id:
          type: integer
        account_id:
          type: integer
        full_name:
          type: string
        gender:
          type: string
          enum: [male, female]
        dob:
          type: string
          format: date
        phone:
          type: string
        address:
          type: string
          nullable: true
        national_id:
          type: string
        birth_place:
          type: string
        student_id:
          type: string
        classroom_id:
          type: integer
        major:
          type: string
        status:
          type: string
          enum: ["Đang học", "Đã tốt nghiệp", "Tạm ngưng", "Thôi học"]
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StudentInput:
      type: object
      required:
        - full_name
        - gender
        - dob
        - phone
        - national_id
        - birth_place
        - student_id
        - classroom_id
        - major
      properties:
        account_id:
          type: integer
        full_name:
          type: string
        gender:
          type: string
          enum: [male, female]
        dob:
          type: string
          format: date
        phone:
          type: string
        address:
          type: string
        national_id:
          type: string
        birth_place:
          type: string
        student_id:
          type: string
        classroom_id:
          type: integer
        major:
          type: string
        status:
          type: string
          enum: ["Đang học", "Đã tốt nghiệp", "Tạm ngưng", "Thôi học"]
          default: "Đang học"
        notes:
          type: string

    # -------------------------
    # MODELS: TEACHERS
    # -------------------------
    Teacher:
      type: object
      properties:
        id:
          type: integer
        account_id:
          type: integer
          nullable: true
        staff_code:
          type: string
        full_name:
          type: string
        gender:
          type: string
          enum: [male, female]
        dob:
          type: string
          format: date
          nullable: true
        phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        national_id:
          type: string
        degree:
          type: string
          enum: ["Cử nhân", "Thạc sĩ", "Tiến sĩ", "Phó giáo sư", "Giáo sư"]
          nullable: true
        title:
          type: string
          enum:
            ["Trợ giảng", "Giảng viên", "Giảng viên chính", "Nghiên cứu viên"]
          nullable: true
        position:
          type: string
          enum:
            [
              "Giáo viên",
              "Trưởng bộ môn",
              "Phó bộ môn",
              "Trưởng khoa",
              "Phó khoa",
            ]
        department_id:
          type: integer
          nullable: true
        contract_type:
          type: string
          enum: [full_time, part_time, visiting, contract]
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TeacherInput:
      type: object
      required:
        - staff_code
        - full_name
        - gender
        - national_id
      properties:
        account_id:
          type: integer
        staff_code:
          type: string
        full_name:
          type: string
        gender:
          type: string
          enum: [male, female]
        dob:
          type: string
          format: date
        phone:
          type: string
        address:
          type: string
        national_id:
          type: string
        degree:
          type: string
          enum: ["Cử nhân", "Thạc sĩ", "Tiến sĩ", "Phó giáo sư", "Giáo sư"]
        title:
          type: string
          enum:
            ["Trợ giảng", "Giảng viên", "Giảng viên chính", "Nghiên cứu viên"]
        position:
          type: string
          enum:
            [
              "Giáo viên",
              "Trưởng bộ môn",
              "Phó bộ môn",
              "Trưởng khoa",
              "Phó khoa",
            ]
          default: "Giáo viên"
        department_id:
          type: integer
        contract_type:
          type: string
          enum: [full_time, part_time, visiting, contract]
          default: full_time
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        notes:
          type: string
